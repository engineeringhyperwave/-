<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大馬深夜提款機 - 交易歷史與統計</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0b1120;
            --card: #1e293b;
            --blue: #38bdf8;
            --green: #4ade80;
            --red: #fb7185;
            --yellow: #fbbf24;
            --text: #f1f5f9;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: var(--blue); font-size: 1.8rem; margin: 10px 0; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn {
            flex: 1; padding: 12px; border-radius: 15px; border: 1px solid var(--blue);
            background: rgba(56, 189, 248, 0.1); color: var(--blue);
            text-align: center; text-decoration: none; font-weight: bold; font-size: 0.9rem;
        }
        .nav-btn:hover { background: var(--blue); color: white; }

        .card {
            background: var(--card); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        .kpi-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .kpi-box {
            background: var(--card); border-radius: 15px; padding: 15px; text-align: center;
            border: 1px solid #334155;
        }
        .kpi-box .label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; }
        .kpi-box .value { font-size: 1.3rem; font-weight: bold; }
        .win { color: var(--green); }
        .loss { color: var(--red); }
        .neutral { color: var(--yellow); }

        .chart-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-box { flex: 1; min-width: 300px; }
        .chart-box canvas { max-height: 280px; }

        .table-scroll { overflow-x: auto; }
        .history-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
        .history-table th { background: #0f172a; padding: 10px; text-align: left; white-space: nowrap; position: sticky; top: 0; }
        .history-table td { padding: 8px 10px; border-bottom: 1px solid #334155; white-space: nowrap; }

        .status-msg { text-align: center; padding: 30px; color: #94a3b8; }
        .reload-btn {
            display: block; margin: 0 auto 20px auto; background: var(--blue); color: #0b1120;
            border: none; padding: 10px 25px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 交易歷史與統計</h1>

    <div class="nav-bar">
        <a href="index.html" class="nav-btn">🏠 返回首頁</a>
        <a href="3.html" class="nav-btn">🧮 回到結算中心</a>
    </div>

    <button class="reload-btn" onclick="loadData()">🔄 從 Google Sheet 重新載入</button>

    <div id="content">
        <div class="status-msg" id="status">正在從 Google Sheet 讀取資料...</div>
    </div>
</div>

<script>
    // ============================================
    // ⚠️ 請把下面這行換成你部署 Apps Script 後得到的網址（與 trade.html 相同）
    // ============================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwCanB3qbBHcS9OF7XQ8EF_XdH3ztI3tQTzcPObM6Ewjwxda0YiJ_WHTGreePtB2tE/exec";

    let charts = {};

    async function loadData() {
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('content');

        if (!GAS_URL || GAS_URL.indexOf("PASTE_YOUR") !== -1) {
            contentEl.innerHTML = '<div class="status-msg">⚠️ 尚未設定 Google Sheet 網址，請先在 trade.html 與 count.html 中填入 GAS_URL</div>';
            return;
        }

        contentEl.innerHTML = '<div class="status-msg" id="status">正在從 Google Sheet 讀取資料...</div>';

        try {
            const res = await fetch(GAS_URL + "?action=getAll");
            const json = await res.json();

            if (json.status !== "ok") {
                contentEl.innerHTML = '<div class="status-msg">❌ 讀取失敗: ' + (json.message || "未知錯誤") + '</div>';
                return;
            }

            const data = json.data || [];
            if (data.length === 0) {
                contentEl.innerHTML = '<div class="status-msg">尚無交易記錄，先去結算中心記錄第一筆吧！</div>';
                return;
            }

            render(data);
        } catch (err) {
            contentEl.innerHTML = '<div class="status-msg">❌ 連線失敗: ' + err.message + '</div>';
        }
    }

    function render(data) {
        const contentEl = document.getElementById('content');

        // ---------- KPI 計算 ----------
        let totalUsd = 0, totalMyr = 0, totalFeeUsd = 0, totalFeeMyr = 0;
        let wins = 0, losses = 0;
        const symbolStats = {}; // { symbol: { usd, count, wins } }
        const rsiBuckets = {}; // RSI 區間 -> {usd, count, wins}

        data.forEach(r => {
            const usd = parseFloat(r.usd) || 0;
            const myr = parseFloat(r.myr) || 0;
            const fx = parseFloat(r.fxRate) || 4.07;
            const bFee = parseFloat(r.buyFee) || 0;
            const sFee = parseFloat(r.sellFee) || 0;
            const feeUsd = bFee + sFee;

            totalUsd += usd;
            totalMyr += myr;
            totalFeeUsd += feeUsd;
            totalFeeMyr += feeUsd * fx;

            if (usd >= 0) wins++; else losses++;

            const sym = (r.symbol || "--").toUpperCase();
            if (!symbolStats[sym]) symbolStats[sym] = { usd: 0, count: 0, wins: 0 };
            symbolStats[sym].usd += usd;
            symbolStats[sym].count += 1;
            if (usd >= 0) symbolStats[sym].wins += 1;

            const rsi = parseFloat(r.rsiEntry);
            if (!isNaN(rsi)) {
                const bucket = rsiBucket(rsi);
                if (!rsiBuckets[bucket]) rsiBuckets[bucket] = { usd: 0, count: 0, wins: 0 };
                rsiBuckets[bucket].usd += usd;
                rsiBuckets[bucket].count += 1;
                if (usd >= 0) rsiBuckets[bucket].wins += 1;
            }
        });

        const totalTrades = data.length;
        const winRate = totalTrades > 0 ? (wins / totalTrades * 100) : 0;

        // ---------- KPI 區塊 ----------
        let html = `
        <div class="kpi-grid">
            <div class="kpi-box">
                <div class="label">總交易筆數</div>
                <div class="value">${totalTrades}</div>
            </div>
            <div class="kpi-box">
                <div class="label">總淨盈虧 (USD)</div>
                <div class="value ${totalUsd >= 0 ? 'win' : 'loss'}">${totalUsd >= 0 ? '+' : ''}$${totalUsd.toFixed(2)}</div>
            </div>
            <div class="kpi-box">
                <div class="label">總淨盈虧 (MYR)</div>
                <div class="value ${totalMyr >= 0 ? 'win' : 'loss'}">${totalMyr >= 0 ? '+' : ''}${Math.round(totalMyr)}</div>
            </div>
            <div class="kpi-box">
                <div class="label">勝率</div>
                <div class="value ${winRate >= 50 ? 'win' : 'loss'}">${winRate.toFixed(1)}% (${wins}W / ${losses}L)</div>
            </div>
            <div class="kpi-box">
                <div class="label">累計手續費 (USD)</div>
                <div class="value neutral">$${totalFeeUsd.toFixed(2)}</div>
            </div>
            <div class="kpi-box">
                <div class="label">累計手續費 (MYR)</div>
                <div class="value neutral">${Math.round(totalFeeMyr)}</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="card chart-box">
                <label style="color: var(--blue);">📈 累計盈虧曲線 (USD)</label>
                <canvas id="equityChart"></canvas>
            </div>
            <div class="card chart-box">
                <label style="color: var(--blue);">🏷️ 各股票盈虧 (USD)</label>
                <canvas id="symbolChart"></canvas>
            </div>
        </div>

        <div class="chart-row">
            <div class="card chart-box">
                <label style="color: var(--blue);">📊 進場 RSI 區間 勝率與盈虧</label>
                <canvas id="rsiChart"></canvas>
            </div>
            <div class="card chart-box">
                <label style="color: var(--blue);">🧧 手續費佔比</label>
                <canvas id="feeChart"></canvas>
            </div>
        </div>

        <div class="card">
            <label style="color: var(--blue);">📝 完整交易記錄 (${totalTrades} 筆)</label>
            <div class="table-scroll">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>日期</th><th>股票</th><th>買入時間</th><th>賣出時間</th>
                        <th>進場RSI</th><th>出場RSI</th><th>買入價</th><th>賣出價</th>
                        <th>股數</th><th>匯率</th><th>手續費USD</th><th>美金淨盈虧</th><th>馬幣淨盈虧</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.map(r => {
                        const usd = parseFloat(r.usd) || 0;
                        const cls = usd >= 0 ? 'win' : 'loss';
                        const feeUsd = (parseFloat(r.buyFee) || 0) + (parseFloat(r.sellFee) || 0);
                        return `<tr>
                            <td>${r.date || ''}</td>
                            <td>${r.symbol || '--'}</td>
                            <td>${r.entryTime || '--'}</td>
                            <td>${r.exitTime || '--'}</td>
                            <td>${r.rsiEntry || '--'}</td>
                            <td>${r.rsiExit || '--'}</td>
                            <td>${r.buyPrice || ''}</td>
                            <td>${r.sellPrice || ''}</td>
                            <td>${r.shares || ''}</td>
                            <td>${r.fxRate || ''}</td>
                            <td>$${feeUsd.toFixed(2)}</td>
                            <td class="${cls}">${usd >= 0 ? '+' : ''}${usd.toFixed(2)}</td>
                            <td class="${cls}">${r.myr >= 0 ? '+' : ''}${r.myr}</td>
                        </tr>`;
                    }).reverse().join('')}
                </tbody>
            </table>
            </div>
        </div>
        `;

        contentEl.innerHTML = html;

        // ---------- 圖表 ----------
        drawEquityChart(data);
        drawSymbolChart(symbolStats);
        drawRsiChart(rsiBuckets);
        drawFeeChart(totalUsd, totalFeeUsd);
    }

    function rsiBucket(rsi) {
        if (rsi > 85) return ">85 極端超買";
        if (rsi >= 70) return "70-85 超買";
        if (rsi >= 55) return "55-65 做多";
        if (rsi >= 46) return "46-54 觀望";
        if (rsi >= 35) return "35-45 做空";
        if (rsi >= 20) return "20-35 超賣";
        if (rsi >= 13) return "13-20 深度";
        return "<13 極端超賣";
    }

    function destroyChart(id) {
        if (charts[id]) { charts[id].destroy(); }
    }

    function drawEquityChart(data) {
        const sorted = [...data]; // assume sheet order is chronological
        let cum = 0;
        const labels = [];
        const points = [];
        sorted.forEach((r, i) => {
            cum += parseFloat(r.usd) || 0;
            labels.push((r.date || '') + (r.symbol ? ' ' + r.symbol : ''));
            points.push(cum.toFixed(2));
        });

        destroyChart('equityChart');
        charts.equityChart = new Chart(document.getElementById('equityChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '累計淨盈虧 (USD)',
                    data: points,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56,189,248,0.1)',
                    fill: true,
                    tension: 0.2,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#f1f5f9' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 8 }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    function drawSymbolChart(symbolStats) {
        const labels = Object.keys(symbolStats);
        const values = labels.map(s => symbolStats[s].usd.toFixed(2));
        const colors = values.map(v => v >= 0 ? '#4ade80' : '#fb7185');

        destroyChart('symbolChart');
        charts.symbolChart = new Chart(document.getElementById('symbolChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: '淨盈虧 (USD)',
                    data: values,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    function drawRsiChart(rsiBuckets) {
        const order = ["<13 極端超賣", "13-20 深度", "20-35 超賣", "35-45 做空", "46-54 觀望", "55-65 做多", "70-85 超買", ">85 極端超買"];
        const labels = order.filter(k => rsiBuckets[k]);
        const winRates = labels.map(k => (rsiBuckets[k].wins / rsiBuckets[k].count * 100).toFixed(1));
        const usdValues = labels.map(k => rsiBuckets[k].usd.toFixed(2));

        destroyChart('rsiChart');
        charts.rsiChart = new Chart(document.getElementById('rsiChart'), {
            data: {
                labels: labels,
                datasets: [
                    {
                        type: 'bar',
                        label: '淨盈虧 (USD)',
                        data: usdValues,
                        backgroundColor: usdValues.map(v => v >= 0 ? 'rgba(74,222,128,0.6)' : 'rgba(251,113,133,0.6)'),
                        yAxisID: 'y'
                    },
                    {
                        type: 'line',
                        label: '勝率 (%)',
                        data: winRates,
                        borderColor: '#fbbf24',
                        backgroundColor: '#fbbf24',
                        yAxisID: 'y1',
                        tension: 0.2
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#f1f5f9' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { position: 'left', ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y1: { position: 'right', min: 0, max: 100, ticks: { color: '#fbbf24' }, grid: { display: false } }
                }
            }
        });
    }

    function drawFeeChart(totalUsd, totalFeeUsd) {
        const grossEstimate = totalUsd + totalFeeUsd; // 反推毛利
        destroyChart('feeChart');
        charts.feeChart = new Chart(document.getElementById('feeChart'), {
            type: 'doughnut',
            data: {
                labels: ['淨盈虧 (扣除手續費後)', '手續費總額'],
                datasets: [{
                    data: [Math.max(totalUsd, 0).toFixed(2), totalFeeUsd.toFixed(2)],
                    backgroundColor: ['#4ade80', '#fbbf24']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#f1f5f9' } } }
            }
        });
    }

    // 頁面載入時自動讀取
    loadData();
</script>

</body>
</html>
