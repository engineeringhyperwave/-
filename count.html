<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TQQQ/SQQQ 双模量化决策雷达</title>
    <style>
        body {
            font-family: 'PingFang SC', -apple-system, sans-serif;
            background-color: #0b0f19;
            color: #f1f5f9;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header-container {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 0;
            background-color: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background-color: #334155;
            color: #fff;
            border-color: #475569;
        }
        h1 {
            flex-grow: 1;
            text-align: center;
            color: #38bdf8;
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #fbbf24;
            margin-top: 0;
            font-size: 1.2rem;
            border-left: 4px solid #fbbf24;
            padding-left: 8px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            background-color: #0f172a;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 10px;
            border: 1px solid #1e293b;
        }
        /* 手动控制备用舱样式 */
        .manual-panel {
            background-color: #1a202c;
            border: 1px dashed #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #f8fafc;
        }
        .checkbox-container input {
            width: auto;
            margin-right: 10px;
            margin-bottom: 0;
            transform: scale(1.2);
        }
        .signal-box {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
        }
        .direction-tag {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .win-rate-tag {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .money-tag {
            font-size: 1.3rem;
            background-color: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: #34d399;
            padding: 15px 25px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.1);
        }
        .text-blue { color: #38bdf8; }
        .text-green { color: #34d399; }
        .text-red { color: #f43f5e; }
        .text-gray { color: #64748b; }
        
        .loading-pulse {
            color: #fbbf24;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
<div class="header-container">
    <a href="index.html" class="back-btn">⬅ 返回首页</a>

    <a href="3.html"
       class="back-btn"
       style="left:140px;">
       📊 前往 3.html
    </a>

    <h1>QQQ 量化分析</h1>
</div>

    <!-- 配置板 -->
    <div class="card">
        <h2>1. 设定资金与运行模式</h2>
        <label>短线当前可用总资金 (马币 MYR)</label>
        <input type="number" id="txt_capital" value="5000" oninput="runDecisionEngine()">
        
        <!-- 自动追踪状态条 -->
        <div class="status-bar">
            <div>雷达状态：<span id="lbl_status" class="loading-pulse">正在连接公开金融数据库...</span></div>
            <div>自动刷新：每 10 秒</div>
        </div>

        <!-- 🛡️ 手动防断网备用舱 -->
        <div class="manual-panel">
            <label class="checkbox-container">
                <input type="checkbox" id="chk_manual" onchange="toggleMode()"> 
                🚨 开启手动输入 RSI 备用模式（网络卡顿/未开盘时使用）
            </label>
            <div id="manual_input_area" style="display: none; margin-top: 10px;">
                <label style="color: #fbbf24;">请输入来自 Moomoo 的 5分钟 RSI1 数字：</label>
                <input type="number" id="txt_manual_rsi" value="50" min="0" max="100" oninput="runDecisionEngine()">
            </div>
        </div>
    </div>

    <!-- 铁血量化决策输出 -->
    <div class="card" style="border: 2px solid #38bdf8; background: radial-gradient(circle at top, #1e293b 0%, #111827 100%);">
        <h2>2. 华尔街量化实时决策结果</h2>
        
        <div class="signal-box" id="result_box">
            <div id="lbl_loading" class="loading-pulse" style="font-size: 1.2rem;">📡 正在全自动抓取 QQQ 实时数据并计算 5分钟 RSI，请稍候...</div>
            <div id="main_content" style="display: none;">
                <div class="direction-tag" id="lbl_action">--</div>
                <div style="font-size: 1.1rem; color: #94a3b8; margin: 10px 0;">
                    当前正在使用的 5M-RSI：<span id="lbl_rsi_val" style="font-weight: bold; color: #fbbf24;">--</span>
                </div>
                <div class="win-rate-tag" id="lbl_rate">--</div>
                <div id="lbl_money_container"></div>
            </div>
        </div>
    </div>

    <script>
        let cachedAutoRSI = null; // 缓存自动抓取的RSI

        // 切换全自动/手动备用模式
        function toggleMode() {
            const isManual = document.getElementById('chk_manual').checked;
            const manualArea = document.getElementById('manual_input_area');
            const statusLabel = document.getElementById('lbl_status');

            if (isManual) {
                manualArea.style.display = 'block';
                statusLabel.className = "text-gray";
                statusLabel.innerText = "🛑 自动雷达已暂停 · 当前为手动备用模式";
                // 隐藏全网加载提示，直接展示内容
                document.getElementById('lbl_loading').style.display = 'none';
                document.getElementById('main_content').style.display = 'block';
            } else {
                manualArea.style.display = 'none';
                if (cachedAutoRSI === null) {
                    document.getElementById('lbl_loading').style.display = 'block';
                    document.getElementById('main_content').style.display = 'none';
                }
                fetchQQQData(); // 切回全自动时，立即刷一次数据
            }
            runDecisionEngine();
        }

        // 全自动抓取 Yahoo Finance 数据
        async function fetchQQQData() {
            // 如果用户开启了手动模式，后台默默停止网络请求，不浪费资源
            if (document.getElementById('chk_manual').checked) return;

            try {
                document.getElementById('lbl_status').className = "loading-pulse";
                document.getElementById('lbl_status').innerText = "正在同步 QQQ 实时盘面...";

                const response = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/QQQ?interval=5m&range=1d');
                const data = await response.json();
                
                const quotes = data.chart.result[0].indicators.quote[0].close;
                const cleanQuotes = quotes.filter(p => p !== null && p !== undefined);

                if (cleanQuotes.length < 15) {
                    throw new Error("盘前或刚刚开盘，K线数量不足以计算RSI");
                }

                // 核心量化算法计算出最新 RSI
                cachedAutoRSI = calculateRSI(cleanQuotes, 14);
                
                document.getElementById('lbl_status').className = "text-green";
                document.getElementById('lbl_status').innerText = "🟢 实时连线中 · 数据已同步";
                document.getElementById('lbl_loading').style.display = 'none';
                document.getElementById('main_content').style.display = 'block';

                runDecisionEngine();

            } catch (error) {
                console.error(error);
                // 自动抓取失败时，如果还没有任何历史RSI缓存，善意提醒用户切换手动模式
                if (cachedAutoRSI === null && !document.getElementById('chk_manual').checked) {
                    document.getElementById('lbl_loading').innerText = "⚠️ 自动获取失败（可能未开盘或网络波动），请勾选下方的【手动输入备用模式】！";
                }
                document.getElementById('lbl_status').className = "text-red";
                document.getElementById('lbl_status').innerText = "🔴 网络连线卡顿，10秒后重试...";
            }
        }

        // 经典的 RSI(14) 纯数学量化公式
        function calculateRSI(prices, period = 14) {
            let changes = [];
            for (let i = 1; i < prices.length; i++) {
                changes.push(prices[i] - prices[i - 1]);
            }
            let recentChanges = changes.slice(-period);
            let gains = 0;
            let losses = 0;
            recentChanges.forEach(change => {
                if (change > 0) gains += change;
                else losses += Math.abs(change);
            });
            if (losses === 0) return 100;
            return 100 - (100 / (1 + (gains / losses)));
        }

        // 核心中央决策引擎：根据当前胜率和凯利公式决定输赢、算钱
        function runDecisionEngine() {
            const isManual = document.getElementById('chk_manual').checked;
            let rsi = null;

            // 判定采用哪个渠道的数字
            if (isManual) {
                rsi = parseFloat(document.getElementById('txt_manual_rsi').value);
            } else {
                rsi = cachedAutoRSI;
            }

            // 如果两个渠道都没拿到数字，直接拦截返回
            if (rsi === null || isNaN(rsi) || rsi < 0 || rsi > 100) {
                return;
            }

            const capital = parseFloat(document.getElementById('txt_capital').value) || 0;
            const actionLbl = document.getElementById('lbl_action');
            const rsiValLbl = document.getElementById('lbl_rsi_val');
            const rateLbl = document.getElementById('lbl_rate');
            const moneyContainer = document.getElementById('lbl_money_container');
            const resultBox = document.getElementById('result_box');

            rsiValLbl.innerText = rsi.toFixed(2);

            let direction = "";
            let winRate = 0.50;
            let actionClass = "";

            // 铁血动量判定信号
            if (rsi >= 55) {
                direction = "📈 建议买入：TQQQ (看多纳指)";
                actionClass = "direction-tag text-blue";
                resultBox.style.borderColor = "#38bdf8";
                winRate = 0.53 + ((rsi - 55) / 25) * 0.12;
                if (winRate > 0.68) winRate = 0.68;
            } else if (rsi <= 45) {
                direction = "📉 建议买入：SQQQ (看空纳指)";
                actionClass = "direction-tag text-red";
                resultBox.style.borderColor = "#f43f5e";
                winRate = 0.53 + ((45 - rsi) / 25) * 0.12;
                if (winRate > 0.68) winRate = 0.68;
            } else {
                direction = "⚖️ 胜率无优势：今晚强制空仓观望";
                actionClass = "direction-tag text-gray";
                resultBox.style.borderColor = "#334155";
                winRate = 0.50;
            }

            actionLbl.innerText = direction;
            actionLbl.className = actionClass;
            rateLbl.innerText = "预估今晚胜率：" + (winRate * 100).toFixed(1) + "%";

            // 凯利公式算账
            if (winRate > 0.50 && capital > 0) {
                const p = winRate;
                const q = 1 - p;
                const b = 3 / 1.5; // 3%止盈 / 1.5%止损 = 赔率 2
                let f = (p * b - q) / b;
                if (f < 0) f = 0;
                
                const investMoney = capital * f;
                moneyContainer.innerHTML = `
                    <div style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 5px;">动态凯利推荐下注比例：${(f * 100).toFixed(2)}%</div>
                    <div class="money-tag">今日推荐下注金额：${investMoney.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})} 马币</div>
                `;
            } else {
                moneyContainer.innerHTML = `
                    <div style="font-size: 1rem; color: #f43f5e; font-weight: bold; margin-top: 15px;">
                        🛑 提示：当前属于无优势震荡带，下注亏损风险极高，请空仓观望！
                    </div>
                `;
            }
        }

        // 启动自动加载
        fetchQQQData();
        setInterval(fetchQQQData, 10000); // 10秒全自动高频刷新
    </script>
</body>
</html>
