<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓盈亏换算器</title>

<style>
body {
    font-family: 'PingFang SC', -apple-system, sans-serif;
    background-color: #0b0f19;
    color: #f1f5f9;
    padding: 15px;
    max-width: 800px;
    margin: 0 auto;
}

/* 顶部跳转 */
.header-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
}

.btn-group {
    display: flex;
    gap: 10px;
}

/* 🔥 更圆润按钮 */
.back-btn {
    flex: 1;
    text-align: center;
    background-color: #1e293b;
    color: #94a3b8;
    border: 1px solid #334155;
    padding: 10px 12px;
    border-radius: 14px;   /* ← 关键：6 → 14 */
    text-decoration: none;
    font-weight: bold;
    transition: all 0.2s ease;
}

.back-btn:hover {
    background-color: #334155;
    transform: translateY(-1px);
}

/* 🔥 卡片更“软” */
.card {
    background-color: #1e293b;
    border-radius: 18px;   /* ← 12 → 18 */
    padding: 22px;
    border: 1px solid rgba(148,163,184,0.15);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* 标题更柔和 */
h2 {
    color: #34d399;
    margin-top: 0;
    border-left: 4px solid #34d399;
    padding-left: 10px;
    border-radius: 4px;
}

/* 输入框升级圆润 */
input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;   /* ← 6 → 12 */
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    margin-bottom: 10px;
    transition: all 0.2s ease;
}

/* 🔥 输入框聚焦效果 */
input:focus {
    outline: none;
    border-color: #38bdf8;
    box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
}

/* 结果框更柔和 */
.result-highlight {
    margin-top: 15px;
    padding: 16px;
    border-radius: 14px;  /* ← 更圆 */
    border: 1px dashed rgba(148,163,184,0.25);
    text-align: center;
    font-size: 1.1rem;
    background: rgba(15,23,42,0.6);
}

.badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    min-width: 78px;   /* 🔥关键：变“格子” */
    padding: 6px 10px;

    border-radius: 8px; /* 方，不圆 */
    font-weight: 700;
    font-size: 0.95rem;

    border: 1px solid;
    background: rgba(255,255,255,0.03);

    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}

.badge-green {
    color: #34d399;
    background: rgba(52, 211, 153, 0.08);
    border-color: rgba(52, 211, 153, 0.3);
}

.badge-red {
    color: #f43f5e;
    background: rgba(244, 63, 94, 0.08);
    border-color: rgba(244, 63, 94, 0.3);
}

/* PC优化 */
@media(min-width:600px){
    .header-container{
        flex-direction:row;
        align-items:center;
    }
    .btn-group{
        flex:1;
    }
}
</style>
</head>

<body>

<!-- 顶部跳转 -->
<div class="header-container">
    <div class="btn-group">
        <a href="index.html" class="back-btn">⬅ 返回首页</a>
        <a href="3.html" class="back-btn">📚记录/笔记 ➡</a>
    </div>
</div>

<div class="card">
    <h2>目标收益价格计算器</h2>

    <label>买入价格 (USD)</label>
    <input type="number" id="target_buy" value="73.07" oninput="calcTarget()">

    <label>目标涨跌幅 (%)</label>
    <input type="number" id="target_pct" value="2.3" oninput="calcTarget()">

    <div class="result-highlight" id="target_result">
        --
    </div>
</div>

<!-- 模块4：持仓盈亏 -->
<div class="card">
    <h2>持仓盈亏与汇率换算</h2>

    <label>买入价格 (USD)</label>
    <input type="number" id="buy" value="75.27" oninput="calc()">

    <label>持股数量</label>
    <input type="number" id="shares" value="11" oninput="calc()">

    <label>卖出价格 (USD)</label>
    <input type="number" id="sell" value="76.02" oninput="calc()">

    <label>汇率 (USD → MYR)</label>
    <input type="number" id="fx" value="4.06" oninput="calc()">

    <div class="result-highlight" id="result">
        --
    </div>
</div>

<script>
function calc(){
    const buy = parseFloat(document.getElementById('buy').value);
    const sell = parseFloat(document.getElementById('sell').value);
    const shares = parseFloat(document.getElementById('shares').value);
    const fx = parseFloat(document.getElementById('fx').value);

    const box = document.getElementById('result');

    if(!buy || !sell || !shares || !fx){
        box.innerHTML = "--";
        box.className = "result-highlight";
        return;
    }

    const profitUSD = (sell - buy) * shares;
    const profitMYR = profitUSD * fx;
    const pct = ((sell - buy) / buy) * 100;
    const isWin = profitUSD >= 0;

    box.innerHTML = `
        <div style="margin-bottom:6px;">
            价格变化：
            <span class="badge ${isWin ? 'badge-green' : 'badge-red'}">
                ${pct.toFixed(2)}%
            </span>
        </div>

        <div>
            ${isWin ? "盈利" : "亏损"}：
            <span class="badge ${isWin ? 'badge-green' : 'badge-red'}">
                $${Math.abs(profitUSD).toFixed(2)} USD
            </span>
            <span class="badge ${isWin ? 'badge-green' : 'badge-red'}">
                RM ${Math.abs(profitMYR).toFixed(2)}
            </span>
        </div>
    `;

    box.style.borderColor = isWin ? "#34d399" : "#f43f5e";
}


function calcTarget(){
    const buy = parseFloat(document.getElementById('target_buy').value);
    const pct = parseFloat(document.getElementById('target_pct').value);

    const box = document.getElementById('target_result');

    if(!buy || !pct){
        box.innerHTML = "--";
        return;
    }

    const targetPrice = buy * (1 + pct / 100);
    const lossPrice = buy * (1 - pct / 100);

    box.innerHTML = `
        <div style="margin-bottom:6px;">
            📈 上涨 ${pct}%：
            <span class="badge badge-green">
                $${targetPrice.toFixed(2)}
            </span>
        </div>

        <div>
            📉 下跌 ${pct}%：
            <span class="badge badge-red">
                $${lossPrice.toFixed(2)}
            </span>
        </div>
    `;
}


/* ✅ 只保留一个 onload（修复你原来的覆盖问题） */
window.onload = function() {
    calc();
    calcTarget();
};
</script>

</body>
</html>
