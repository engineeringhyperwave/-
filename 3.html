<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大馬深夜提款機 V3.5 - 交易結算中心</title>
    <style>
        :root {
            --bg: #0b1120;
            --card: #1e293b;
            --blue: #38bdf8;
            --green: #4ade80;
            --red: #fb7185;
            --yellow: #fbbf24;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }

        h1 { text-align: center; color: var(--blue); font-size: 1.8rem; margin: 10px 0; }

        /* 頂部按鈕 */
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn {
            flex: 1; padding: 12px; border-radius: 15px; border: 1px solid var(--blue);
            background: rgba(56, 189, 248, 0.1); color: var(--blue);
            text-align: center; text-decoration: none; font-weight: bold; font-size: 0.9rem;
        }
        .nav-btn:hover { background: var(--blue); color: white; }

        /* 佈局：左側計算，右側參考表 */
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .calc-section { flex: 2; min-width: 300px; }
        .info-section { flex: 1; min-width: 250px; }

        .card {
            background: var(--card); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        /* 表單樣式 */
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; font-weight: bold; }
        input {
            background: #0f172a; border: 1px solid #334155; color: white;
            padding: 12px; border-radius: 12px; font-size: 1rem; outline: none;
            text-transform: uppercase;
        }
        input:focus { border-color: var(--blue); }

        /* RSI 參考表樣式 */
        .rsi-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .rsi-table th, .rsi-table td { padding: 8px; border-bottom: 1px solid #334155; text-align: center; }
        .rsi-table th { color: var(--yellow); }
        .row-high { color: var(--blue); font-weight: bold; }
        .row-low { color: var(--red); font-weight: bold; }

        /* 結算結果區域 */
        .summary-box {
            text-align: center; padding: 15px; border-radius: 15px;
            background: rgba(0,0,0,0.2); border: 1px solid #334155; margin-top: 10px;
        }

        /* 手續費小計 */
        .fee-box {
            display: flex; justify-content: space-around; margin-top: 10px;
            font-size: 0.8rem; color: #94a3b8;
        }
        .fee-box b { color: var(--yellow); }

        .record-btn {
            width: 100%; background: var(--green); color: #064e3b; border: none;
            padding: 15px; border-radius: 15px; font-weight: bold; font-size: 1rem;
            margin-top: 15px; cursor: pointer;
        }
        .record-btn:disabled { opacity: 0.6; cursor: wait; }

        /* 歷史記錄表格 */
        .history-table { width: 100%; font-size: 0.8rem; margin-top: 10px; border-collapse: collapse; }
        .history-table th { background: #0f172a; padding: 10px; text-align: left; white-space: nowrap; }
        .history-table td { padding: 10px; border-bottom: 1px solid #334155; white-space: nowrap; }
        .win { color: var(--green); }
        .loss { color: var(--red); }

        .table-scroll { overflow-x: auto; }

        .sync-status {
            font-size: 0.75rem; text-align: center; margin-top: 8px; color: #64748b;
        }
        .sync-status.ok { color: var(--green); }
        .sync-status.err { color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <h1>深夜提款機 V3.5 結算中心</h1>

    <div class="nav-bar">
        <a href="index.html" class="nav-btn">🏠 返回首頁</a>
        <a href="count.html" class="nav-btn">📗 Google Sheet</a>
    </div>

    <div class="main-layout">
        <!-- 左側：計算與錄入 -->
        <div class="calc-section">
            <div class="card">
                <div class="grid-input">
                    <div class="input-group">
                        <label>📅 交易日期</label>
                        <input type="date" id="tradeDate">
                    </div>
                    <div class="input-group">
                        <label>🏷️ 股票編號</label>
                        <input type="text" id="symbol" placeholder="例如 TQQQ / SQQQ / NVTS">
                    </div>
                    <div class="input-group">
                        <label>⏰ 買入時間</label>
                        <input type="time" id="entryTime">
                    </div>
                    <div class="input-group">
                        <label>⏰ 賣出時間</label>
                        <input type="time" id="exitTime">
                    </div>
                    <div class="input-group">
                        <label>📈 進場 RSI</label>
                        <input type="number" id="rsiEntry" placeholder="例如 55">
                    </div>
                    <div class="input-group">
                        <label>📉 出場 RSI</label>
                        <input type="number" id="rsiExit" placeholder="例如 70">
                    </div>
                    <div class="input-group">
                        <label>💰 買入美金價</label>
                        <input type="number" id="buyPrice" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>💵 賣出美金價</label>
                        <input type="number" id="sellPrice" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>🔢 股數</label>
                        <input type="number" id="shares" value="50">
                    </div>
                    <div class="input-group">
                        <label>💱 結算匯率</label>
                        <input type="number" id="fxRate" value="4.07" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>🧧 買入手續費 (USD)</label>
                        <input type="number" id="buyFee" value="2.29">
                    </div>
                    <div class="input-group">
                        <label>🧧 賣出手續費 (USD)</label>
                        <input type="number" id="sellFee" value="2.32">
                    </div>
                </div>

                <div class="summary-box">
                    <div id="netUsd" style="font-size: 1.5rem; font-weight: bold;">$0.00 USD</div>
                    <div id="netMyr" style="color: var(--yellow); font-size: 1.1rem;">0 MYR (淨利潤)</div>
                    <div class="fee-box">
                        <div>本筆手續費: <b id="thisFeeUsd">$0.00</b> USD / <b id="thisFeeMyr">0</b> MYR</div>
                    </div>
                    <div class="fee-box">
                        <div>累計手續費: <b id="totalFeeUsd">$0.00</b> USD / <b id="totalFeeMyr">0</b> MYR</div>
                    </div>
                </div>

                <button class="record-btn" id="saveBtn" onclick="saveRecord()">✅ 記錄這筆交易</button>
                <div class="sync-status" id="syncStatus">尚未同步到 Google Sheet</div>
            </div>
        </div>

        <!-- 右側：RSI 快速參考表 -->
        <div class="info-section">
            <div class="card">
                <label style="color: var(--blue); display: block; text-align: center; margin-bottom: 10px;">RSI 決策參考表</label>
                <table class="rsi-table">
                    <thead>
                        <tr><th>RSI 區間</th><th>建議</th><th>勝率</th></tr>
                    </thead>
                    <tbody>
                        <tr class="row-high"><td>>85</td><td>极端超买</td><td>68%</td></tr>
                        <tr class="row-high"><td>70~85</td><td>超買</td><td>62%</td></tr>
                        <tr class="row-high"><td>55~65</td><td>做多</td><td>55%</td></tr>
                        <tr><td>46-54</td><td>觀望</td><td>50%</td></tr>
                        <tr class="row-low"><td>35-45</td><td>做空</td><td>58%</td></tr>
                        <tr class="row-low"><td>20~35</td><td>超賣</td><td>60%</td></tr>
                        <tr class="row-low"><td>13~20</td><td>深度</td><td>67%</td></tr>
                        <tr class="row-low"><td>13</td><td>极端超卖</td><td>68%</td></tr>
                    </tbody>
                </table>
                <div style="font-size: 0.7rem; color: #64748b; margin-top: 15px; line-height: 1.4;">
                    * 勝率基於 5 分鐘線統計。<br>
                    * 買入手續費建議保留盈餘空間。
                </div>
            </div>
        </div>
    </div>

    <!-- 底部：最近交易 -->
    <div class="card">
        <label>📝 最近 5 筆記錄 (本機快取)</label>
        <div class="table-scroll">
        <table class="history-table" id="historyTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>股票</th>
                    <th>RSI 進/出</th>
                    <th>美金淨盈虧</th>
                    <th>馬幣淨盈虧</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <!-- 數據會在這裡生成 -->
            </tbody>
        </table>
        </div>
    </div>
</div>

<script>
    // ============================================
    // ⚠️ 請把下面這行換成你部署 Apps Script 後得到的網址
    // ============================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwCanB3qbBHcS9OF7XQ8EF_XdH3ztI3tQTzcPObM6Ewjwxda0YiJ_WHTGreePtB2tE/exec";

    // 初始化日期
    document.getElementById('tradeDate').valueAsDate = new Date();

    function calculateNet() {
        const buy = parseFloat(document.getElementById('buyPrice').value) || 0;
        const sell = parseFloat(document.getElementById('sellPrice').value) || 0;
        const shares = parseFloat(document.getElementById('shares').value) || 0;
        const fx = parseFloat(document.getElementById('fxRate').value) || 4.7;
        const bFee = parseFloat(document.getElementById('buyFee').value) || 0;
        const sFee = parseFloat(document.getElementById('sellFee').value) || 0;

        const thisFeeUsd = bFee + sFee;
        const thisFeeMyr = thisFeeUsd * fx;

        document.getElementById('thisFeeUsd').innerText = "$" + thisFeeUsd.toFixed(2);
        document.getElementById('thisFeeMyr').innerText = Math.round(thisFeeMyr);

        if (buy === 0 || sell === 0 || shares === 0) {
            document.getElementById('netUsd').innerText = "$0.00 USD";
            document.getElementById('netUsd').style.color = "var(--text)";
            document.getElementById('netMyr').innerText = "0 MYR (淨利潤)";
            return { usd: 0, myr: 0, feeUsd: thisFeeUsd, feeMyr: thisFeeMyr };
        }

        const grossUsd = (sell - buy) * shares;
        const netUsd = grossUsd - bFee - sFee;
        const netMyr = netUsd * fx;

        document.getElementById('netUsd').innerText = (netUsd >= 0 ? "+" : "") + "$" + netUsd.toFixed(2) + " USD";
        document.getElementById('netUsd').style.color = netUsd >= 0 ? "var(--green)" : "var(--red)";
        document.getElementById('netMyr').innerText = Math.round(netMyr) + " MYR (淨利潤)";

        return { usd: netUsd.toFixed(2), myr: Math.round(netMyr), feeUsd: thisFeeUsd, feeMyr: thisFeeMyr };
    }

    // 實時計算
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculateNet);
    });

    function getHistory() {
        return JSON.parse(localStorage.getItem('tradeHistory') || "[]");
    }

    function setHistory(h) {
        localStorage.setItem('tradeHistory', JSON.stringify(h));
    }

    function updateTotalFees() {
        const history = getHistory();
        let totalFeeUsd = 0;
        history.forEach(item => {
            totalFeeUsd += (parseFloat(item.buyFee) || 0) + (parseFloat(item.sellFee) || 0);
        });
        // 用最近一筆匯率估算累計馬幣手續費（粗估）
        const lastFx = history.length > 0 ? (parseFloat(history[0].fxRate) || 4.07) : 4.07;
        document.getElementById('totalFeeUsd').innerText = "$" + totalFeeUsd.toFixed(2);
        document.getElementById('totalFeeMyr').innerText = Math.round(totalFeeUsd * lastFx);
    }

    async function saveRecord() {
        const result = calculateNet();
        if (parseFloat(result.usd) === 0) {
            alert("請輸入完整的交易數據（買入價/賣出價/股數）");
            return;
        }

        const record = {
            date: document.getElementById('tradeDate').value,
            symbol: document.getElementById('symbol').value.toUpperCase() || "--",
            entryTime: document.getElementById('entryTime').value || "",
            exitTime: document.getElementById('exitTime').value || "",
            rsiEntry: document.getElementById('rsiEntry').value || "--",
            rsiExit: document.getElementById('rsiExit').value || "--",
            buyPrice: document.getElementById('buyPrice').value,
            sellPrice: document.getElementById('sellPrice').value,
            shares: document.getElementById('shares').value,
            fxRate: document.getElementById('fxRate').value,
            buyFee: document.getElementById('buyFee').value,
            sellFee: document.getElementById('sellFee').value,
            usd: result.usd,
            myr: result.myr
        };

        // 先存本機
        let history = getHistory();
        history.unshift(record);
        setHistory(history);
        updateHistoryTable();
        updateTotalFees();

        // 同步到 Google Sheet
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('syncStatus');

        if (!GAS_URL || GAS_URL.indexOf("PASTE_YOUR") !== -1) {
            status.innerText = "⚠️ 尚未設定 Google Sheet 網址（只保存在本機）";
            status.className = "sync-status err";
            return;
        }

        btn.disabled = true;
        btn.innerText = "⏳ 正在同步到 Google Sheet...";
        status.innerText = "正在同步...";
        status.className = "sync-status";

        try {
            await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "add", record: record })
            });
            status.innerText = "✅ 已同步到 Google Sheet";
            status.className = "sync-status ok";
        } catch (err) {
            status.innerText = "❌ 同步失敗，但已保存在本機: " + err.message;
            status.className = "sync-status err";
        } finally {
            btn.disabled = false;
            btn.innerText = "✅ 記錄這筆交易";
        }
    }

    function updateHistoryTable() {
        let history = getHistory();
        const body = document.getElementById('historyBody');
        body.innerHTML = "";

        history.slice(0, 5).forEach(item => {
            const row = document.createElement('tr');
            const usdClass = item.usd >= 0 ? "win" : "loss";
            row.innerHTML = `
                <td>${item.date}</td>
                <td>${item.symbol || "--"}</td>
                <td>${item.rsiEntry || "--"} / ${item.rsiExit || "--"}</td>
                <td class="${usdClass}">${item.usd >= 0 ? '+' : ''}${item.usd}</td>
                <td class="${usdClass}">${item.myr >= 0 ? '+' : ''}${item.myr}</td>
            `;
            body.appendChild(row);
        });
    }

    // 頁面加載時更新
    updateHistoryTable();
    updateTotalFees();
</script>

</body>
</html>
