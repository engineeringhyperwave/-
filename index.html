<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TQQQ 双功能计算器</title>

<style>

.nav-container{
    display:flex;
    gap:8px;
    margin-top:10px;
    margin-bottom:12px;
}

.nav-btn{
    flex:1;
    text-align:center;
    padding:10px;
    font-size:13px;
    background:rgba(56,189,248,0.1);
    border:1px solid #38bdf8;
    color:#38bdf8;
    border-radius:10px;
    text-decoration:none;
}

body{
    margin:0;
    padding:12px;
    background:#0b1120;
    color:#f1f5f9;
    font-family:Arial;
}

.container{
    max-width:650px;
    margin:auto;
}

h1{
    text-align:center;
    color:#38bdf8;
}

.card{
    background:#1e293b;
    padding:16px;
    border-radius:15px;
    margin-top:12px;
}

label{
    display:block;
    margin-top:10px;
    color:#94a3b8;
    font-size:13px;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.progress{
    height:25px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:12px;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#4ade80);
    text-align:center;
    line-height:25px;
    color:white;
    font-weight:bold;
    transition:.4s;
}

.box{
    background:#0f172a;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #334155;
}

.title{
    font-size:12px;
    color:#94a3b8;
}

.value{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

.green{color:#4ade80;}
.blue{color:#38bdf8;}
.yellow{color:#fbbf24;}

.history{
    margin-top:10px;
    background:#020617;
    padding:10px;
    border-radius:10px;
    max-height:250px;
    overflow:auto;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 TQQQ 双功能计算器</h1>

<!-- 👇这里 -->
<div class="nav-container">
    <a class="nav-btn" href="rsi.html">📊 RSI分析</a>
    <a class="nav-btn" href="3.html">🏠 记录</a>
</div>

📊 功能1：单次收益

<div class="card">

<label>本金 (USD)</label>
<input id="capitalUSD">

<label>目标 (%)</label>
<input id="percent1" value="2.3">

<label>汇率</label>
<input id="fx1" value="4.07">

<button onclick="calc1()">计算单次收益</button>

<div id="result1"></div>

</div>



🎯 功能2：目标回合计算

<div class="card">

<label>当前本金 (MYR)</label>
<input id="capitalMYR">

<label>目标金额 (MYR)</label>
<input id="targetMYR">

<label>每回合 (%)</label>
<input id="percent2" value="2.3">

<label>汇率</label>
<input id="fx2" value="4.07">

<button onclick="calc2()">计算目标回合</button>

<div class="progress">
<div class="bar" id="bar">0%</div>
</div>

<div id="result2"></div>
<div class="history" id="history"></div>

</div>

</div>

<script>

//
// =========================
// 功能1：单次收益
// =========================
//

function calc1(){

let capitalUSD = +document.getElementById("capitalUSD").value;
let percent = +document.getElementById("percent1").value;
let fx = +document.getElementById("fx1").value;

let profitUSD = capitalUSD * percent / 100;
let profitMYR = profitUSD * fx;

document.getElementById("result1").innerHTML = `
<div class="box">
<div class="title">盈利 USD</div>
<div class="value green">$${profitUSD.toFixed(2)}</div>
</div>

<div class="box">
<div class="title">盈利 MYR</div>
<div class="value green">RM ${profitMYR.toFixed(2)}</div>
</div>
`;

}

//
// =========================
// 功能2：目标回合
// =========================
//

function calc2(){

let capitalMYR = +document.getElementById("capitalMYR").value;
let target = +document.getElementById("targetMYR").value;
let percent = +document.getElementById("percent2").value;
let fx = +document.getElementById("fx2").value;

const fee = 4 * fx;

let current = capitalMYR;
let round = 0;
let history = "";

while(current < target && round < 1000){

let before = current;
let profit = before * percent / 100;

current = before + profit - fee;

round++;

history += `第${round}回合：RM ${current.toFixed(2)}\n`;

}

let progress = (capitalMYR / target) * 100;
if(progress > 100) progress = 100;

document.getElementById("bar").style.width = progress + "%";
document.getElementById("bar").innerHTML = progress.toFixed(1) + "%";

document.getElementById("result2").innerHTML = `

<div class="box">
<div class="title">当前本金</div>
<div class="value blue">RM ${capitalMYR.toFixed(2)}</div>
</div>

<div class="box">
<div class="title">目标</div>
<div class="value green">RM ${target.toFixed(2)}</div>
</div>

<div class="box">
<div class="title">需要回合</div>
<div class="value yellow">${round} 次</div>
</div>

<div class="box">
<div class="title">预计最终</div>
<div class="value green">RM ${current.toFixed(2)}</div>
</div>

`;

document.getElementById("history").innerText = history;

}

</script>

</body>
</html>
