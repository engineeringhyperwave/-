<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大馬深夜提款機 v3.0 - 核心面板</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #1e293b;
            --blue: #1890ff;
            --green: #52c41a;
            --red: #ff4d4f;
            --yellow: #faad14;
            --text: #ffffff;
            --input-bg: #0f172a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: var(--blue);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        /* 導航按鈕 */
        .nav-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            background: rgba(24, 144, 255, 0.1);
            border: 1px solid var(--blue);
            color: var(--blue);
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: var(--blue);
            color: white;
        }

        /* 狀態卡片 */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .status-card {
            text-align: center;
            border-left: 8px solid #666;
            transition: border-color 0.5s;
        }

        .time {
            font-size: 2.2rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .statusText {
            margin-top: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 輸入區域 */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: var(--input-bg);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--blue);
        }

        /* 結果顯示 */
        .total-info {
            display: flex;
            justify-content: space-between;
            margin: 15px 5px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .total-info b {
            color: var(--yellow);
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .box {
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .tp { background: rgba(82, 196, 26, 0.1); border: 1px solid var(--green); }
        .sl { background: rgba(255, 77, 79, 0.1); border: 1px solid var(--red); }
        .custom { background: rgba(24, 144, 255, 0.1); border: 1px solid var(--blue); grid-column: span 2; }

        .res-label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 1.6rem; font-family: monospace; font-weight: bold; margin: 5px 0; }
        .profit { font-size: 0.85rem; font-weight: bold; }

        /* 救命設定卡片 */
        .alert-card {
            background: rgba(24, 144, 255, 0.05);
            border: 1px dashed var(--blue);
            border-radius: 15px;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>💸 首页 💸</h1>

    <!-- 導航按鈕 -->
    <div class="nav-container">
        <a href="rsi.html" class="nav-btn">📊 RSI分析</a>
        <a href="3.html" class="nav-btn">🏠 记录/笔记</a>
    </div>

    <!-- 1. 市場狀態 -->
    <div class="card status-card" id="statusCard">
        <div class="time" id="liveTime">00:00:00</div>
        <div id="statusText" class="statusText">市場狀態檢測中...</div>
    </div>

    <!-- 2. 輸入面板 -->
    <div class="card">
        <div class="input-grid">
            <div>
                <label>買入價格 (USD)</label>
                <input type="number" id="buyPrice" placeholder="0.00" step="0.01">
            </div>
            <div>
                <label>股數 (Shares)</label>
                <input type="number" id="shares" value="50">
            </div>
            <div>
                <label>實時匯率 (MYR/USD)</label>
                <input type="number" id="fxRate" value="4.07" step="0.01">
            </div>
            <div>
                <label>止盈百分比 (%)</label>
                <input type="number" id="tpPercent" value="3" step="0.1">
            </div>
            <div>
                <label>止損百分比 (%)</label>
                <input type="number" id="slPercent" value="1.5" step="0.1">
            </div>
            <div>
                <label>自定義目標 (%)</label>
                <input type="number" id="customPercent" value="5" step="0.1">
            </div>
        </div>

        <div class="total-info">
            <div>所需本金 USD: <b id="usdCapital">$0.00</b></div>
            <div>折合馬幣: <b id="myrCapital">0 MYR</b></div>
        </div>

        <!-- 計算結果 -->
        <div class="result-grid">
            <div class="box tp">
                <div class="res-label" style="color: var(--green);">🎯 核心止盈</div>
                <div class="value" id="tpPrice" style="color: #73d13d;">--</div>
                <div class="profit" id="tpProfit" style="color: #73d13d;">0</div>
            </div>

            <div class="box sl">
                <div class="res-label" style="color: var(--red);">🛑 鋼鐵止損</div>
                <div class="value" id="slPrice" style="color: #ff7875;">--</div>
                <div class="profit" id="slLoss" style="color: #ff7875;">0</div>
            </div>

            <div class="box custom">
                <div class="res-label" style="color: var(--blue);">🚀 自定義目標追蹤</div>
                <div class="value" id="customPrice" style="color: var(--blue);">--</div>
                <div class="profit" id="customProfit" style="color: var(--blue);">0</div>
            </div>
        </div>
    </div>

    <!-- 3. OCO 設定提醒 -->
    <div class="alert-card">
        <b>⚠️ 睡前 Moomoo OCO 必備設定：</b><br>
        • 訂單類型：必須選 <b>OCO (組合單)</b><br>
        • 止損觸發：務必選 <b>止損市價 (Stop Market)</b><br>
        • 有效期：當日有效 (Day) + 勾選 <b>允許盤後</b>
    </div>

</div>

<script>
function updateClock(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");

    document.getElementById("liveTime").innerText = `${h}:${m}:${s}`;

    const total = now.getHours()*60 + now.getMinutes();
    const card = document.getElementById("statusCard");
    const text = document.getElementById("statusText");

    if(total >= 1290 && total < 1320){
        card.style.borderColor = "var(--red)";
        text.innerHTML = "❌ 散戶混亂期 (不穩) - 建議觀望";
        text.style.color = "var(--red)";
    }
    else if(total >= 1320 && total < 1350){
        card.style.borderColor = "var(--green)";
        text.innerHTML = "🟢 趨勢確立期 (最穩) - 準備進場";
        text.style.color = "var(--green)";
    }
    else if(total >= 1350 || total < 240){
        card.style.borderColor = "var(--yellow)";
        text.innerHTML = "🌙 睡覺流時間 - 交給系統自動跑";
        text.style.color = "var(--yellow)";
    }
    else{
        card.style.borderColor = "#666";
        text.innerHTML = "💤 美股未開盤 - 養精蓄銳";
        text.style.color = "#94a3b8";
    }
}

function calculate(){
    const buyPrice = parseFloat(document.getElementById("buyPrice").value);
    const shares = parseFloat(document.getElementById("shares").value);
    const fxRate = parseFloat(document.getElementById("fxRate").value);
    const tpPercent = parseFloat(document.getElementById("tpPercent").value);
    const slPercent = parseFloat(document.getElementById("slPercent").value);
    const customPercent = parseFloat(document.getElementById("customPercent").value);

    if(isNaN(buyPrice) || isNaN(shares) || buyPrice <= 0 || shares <= 0){
        return;
    }

    const capitalUsd = buyPrice * shares;
    const capitalMyr = capitalUsd * fxRate;

    document.getElementById("usdCapital").innerText = "$" + capitalUsd.toFixed(2);
    document.getElementById("myrCapital").innerText = Math.round(capitalMyr) + " MYR";

    // 止盈計算
    const tpPrice = buyPrice * (1 + tpPercent/100);
    const tpProfitUsd = (tpPrice - buyPrice) * shares;
    const tpProfitMyr = tpProfitUsd * fxRate;
    document.getElementById("tpPrice").innerText = "$" + tpPrice.toFixed(2);
    document.getElementById("tpProfit").innerHTML = `+${tpProfitUsd.toFixed(2)} USD (+${Math.round(tpProfitMyr)} MYR)`;

    // 止損計算
    const slPrice = buyPrice * (1 - slPercent/100);
    const slLossUsd = (buyPrice - slPrice) * shares;
    const slLossMyr = slLossUsd * fxRate;
    document.getElementById("slPrice").innerText = "$" + slPrice.toFixed(2);
    document.getElementById("slLoss").innerHTML = `-${slLossUsd.toFixed(2)} USD (-${Math.round(slLossMyr)} MYR)`;

    // 自定義計算
    const customPrice = buyPrice * (1 + customPercent/100);
    const customDiffUsd = (customPrice - buyPrice) * shares;
    const customDiffMyr = customDiffUsd * fxRate;
    
    document.getElementById("customPrice").innerText = "$" + customPrice.toFixed(2);
    const sign = customPercent >= 0 ? "+" : "";
    document.getElementById("customProfit").innerHTML = `${sign}${customDiffUsd.toFixed(2)} USD (${sign}${Math.round(customDiffMyr)} MYR)`;
}

// 監聽所有輸入框，達成實時更新
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", calculate);
});

setInterval(updateClock, 1000);
updateClock();
calculate(); // 初始化計算一次
</script>

</body>
</html>
