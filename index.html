<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TQQQ 完整交易工具</title>

<style>
body{
    margin:0;
    padding:12px;
    background:#0b1120;
    color:#f1f5f9;
    font-family:Arial;
}

.container{
    max-width:650px;
    margin:auto;
}

h1{
    text-align:center;
    color:#38bdf8;
}

.card{
    background:#1e293b;
    padding:16px;
    border-radius:15px;
    margin-top:12px;
}

label{
    display:block;
    margin-top:10px;
    color:#94a3b8;
    font-size:13px;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.box{
    background:#0f172a;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #334155;
}

.title{
    font-size:12px;
    color:#94a3b8;
}

.value{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

.green{color:#4ade80;}
.blue{color:#38bdf8;}
.yellow{color:#fbbf24;}
.red{color:#ef4444;}

</style>
</head>

<body>

<div class="container">

<h1>📊 TQQQ 完整交易工具</h1>

<!-- ========================= -->
<!-- 功能1 -->
<!-- ========================= -->
<div class="card">

<h3>📊 功能1：单次收益</h3>

<label>本金 (USD)</label>
<input id="capitalUSD">

<label>目标 (%)</label>
<input id="percent1" value="2.3">

<label>汇率</label>
<input id="fx1" value="4.07">

<button onclick="calc1()">计算单次收益</button>

<div id="result1"></div>

</div>

<!-- ========================= -->
<!-- 功能2 -->
<!-- ========================= -->
<div class="card">

<h3>🔁 功能2：目标回合计算</h3>

<label>当前本金 (MYR)</label>
<input id="capitalMYR">

<label>目标金额 (MYR)</label>
<input id="targetMYR">

<label>每回合 (%)</label>
<input id="percent2" value="2.3">

<label>汇率</label>
<input id="fx2" value="4.07">

<button onclick="calc2()">计算回合</button>

<div id="result2"></div>

</div>

<!-- ========================= -->
<!-- 功能3 -->
<!-- ========================= -->
<div class="card">

<h3>📈 功能3：TQQQ概率区间模型</h3>

<label>Open Price (TQQQ)</label>
<input id="open3" placeholder="例如 76.80">

<button onclick="calc3()">计算概率区间</button>

<div id="result3"></div>

</div>

</div>

<script>

//
// =========================
// 功能1
// =========================
//
function calc1(){

let capitalUSD = +document.getElementById("capitalUSD").value;
let percent = +document.getElementById("percent1").value;
let fx = +document.getElementById("fx1").value;

let profitUSD = capitalUSD * percent / 100;
let profitMYR = profitUSD * fx;

document.getElementById("result1").innerHTML = `
<div class="box">
<div class="title">盈利 USD</div>
<div class="value green">$${profitUSD.toFixed(2)}</div>
</div>

<div class="box">
<div class="title">盈利 MYR</div>
<div class="value green">RM ${profitMYR.toFixed(2)}</div>
</div>
`;
}

//
// =========================
// 功能2
// =========================
//
function calc2(){

let capitalMYR = +document.getElementById("capitalMYR").value;
let target = +document.getElementById("targetMYR").value;
let percent = +document.getElementById("percent2").value;
let fx = +document.getElementById("fx2").value;

const fee = 4 * fx;

let current = capitalMYR;
let round = 0;

while(current < target && round < 1000){

let profit = current * percent / 100;
current = current + profit - fee;

round++;
}

document.getElementById("result2").innerHTML = `
<div class="box">
<div class="title">当前本金</div>
<div class="value blue">RM ${capitalMYR.toFixed(2)}</div>
</div>

<div class="box">
<div class="title">目标</div>
<div class="value green">RM ${target.toFixed(2)}</div>
</div>

<div class="box">
<div class="title">需要回合</div>
<div class="value yellow">${round}</div>
</div>

<div class="box">
<div class="title">预计结果</div>
<div class="value green">RM ${current.toFixed(2)}</div>
</div>
`;
}

//
// =========================
// 功能3（概率模型）
// =========================
//

const rData = [
  0.005, 0.012, 0.018, 0.021, 0.015,
  0.028, 0.033, 0.019, 0.014, 0.025,
  0.031, 0.022, 0.017, 0.029, 0.034,
  0.011, 0.016, 0.027, 0.023, 0.030,
  0.020, 0.013, 0.026, 0.032, 0.010,
  0.038, 0.041, 0.045, 0.024, 0.018,
  0.009, 0.015, 0.021, 0.035, 0.037,
  0.019, 0.012, 0.028, 0.033, 0.020
];

function percentile(arr, p){
    let a = [...arr].sort((a,b)=>a-b);
    let i = (p/100)*(a.length-1);
    let l = Math.floor(i);
    let u = Math.ceil(i);
    return a[l] + (a[u]-a[l])*(i-l);
}

function calc3(){

let open = +document.getElementById("open3").value;

if(!open){
    alert("请输入Open");
    return;
}

let p20 = percentile(rData,20);
let p50 = percentile(rData,50);
let p70 = percentile(rData,70);
let p80 = percentile(rData,80);
let p90 = percentile(rData,90);

document.getElementById("result3").innerHTML = `

<div class="box">
<div class="title">🔵 20%</div>
<div class="value">${(open*(1+p20)).toFixed(2)}</div>
</div>

<div class="box">
<div class="title">🟢 50%</div>
<div class="value">${(open*(1+p50)).toFixed(2)}</div>
</div>

<div class="box">
<div class="title">🟡 70%</div>
<div class="value">${(open*(1+p70)).toFixed(2)}</div>
</div>

<div class="box">
<div class="title">🟠 80%</div>
<div class="value">${(open*(1+p80)).toFixed(2)}</div>
</div>

<div class="box">
<div class="title">🔴 90%</div>
<div class="value">${(open*(1+p90)).toFixed(2)}</div>
</div>

`;
}

</script>

</body>
</html>
