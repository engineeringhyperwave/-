<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TQQQ 目标计算器</title>

<style>
/* ======================
   BASE (手机优先)
====================== */

body {
    margin:0;
    padding:12px;
    background:#0b1120;
    color:#f1f5f9;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 600px;
    margin:auto;
}

/* 标题 */
h1 {
    text-align:center;
    font-size:20px;
    color:#38bdf8;
    margin-bottom:12px;
}

/* ======================
   NAV
====================== */

.nav-container {
    display:flex;
    gap:8px;
    margin-bottom:12px;
}

.nav-btn {
    flex:1;
    text-align:center;
    padding:10px;
    font-size:13px;
    background:rgba(56,189,248,0.1);
    border:1px solid #38bdf8;
    color:#38bdf8;
    border-radius:10px;
    text-decoration:none;
}

/* ======================
   CARD
====================== */

.card {
    background:#1e293b;
    padding:14px;
    border-radius:14px;
}

/* 输入框 */
label {
    font-size:12px;
    color:#94a3b8;
}

input {
    width:100%;
    padding:14px;
    margin:6px 0 10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#0f172a;
    color:#fff;
    outline:none;
}

/* ======================
   BUTTON
====================== */

.calc-btn {
    width:100%;
    padding:16px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:#0b1120;
    font-weight:bold;
    font-size:16px;
}

/* ======================
   RESULT
====================== */

.result {
    display:grid;
    gap:10px;
    margin-top:12px;
}

.box {
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    border:1px solid #334155;
}

.title {
    font-size:12px;
    color:#94a3b8;
}

.value {
    font-size:18px;
    font-weight:bold;
    margin-top:4px;
}

.green { color:#4ade80; }
.blue { color:#38bdf8; }
.yellow { color:#fbbf24; }

/* ======================
   桌面优化（>=768px）
====================== */

@media (min-width: 768px) {
    body {
        padding:20px;
    }

    h1 {
        font-size:26px;
    }

    .card {
        padding:20px;
    }

    .nav-btn {
        font-size:14px;
        padding:12px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>📊 TQQQ 目标计算器</h1>

<!-- NAV -->
<div class="nav-container">
    <a class="nav-btn" href="rsi.html">📊 RSI分析</a>
    <a class="nav-btn" href="3.html">🏠 记录</a>
</div>

<div class="card">

<button class="calc-btn" onclick="calc()">🚀 计算目标</button>

<label>本金 (USD)</label>
<input id="capital" type="number" placeholder="例如 3000">

<label>目标 (%)</label>
<input id="percent" type="number" value="2.3" step="0.1">

<label>汇率 (USD → MYR)</label>
<input id="fx" type="number" value="4.07" step="0.01">

<div class="result" id="result"></div>

</div>

</div>

<script>
function calc() {
    let capital = parseFloat(document.getElementById("capital").value);
    let percent = parseFloat(document.getElementById("percent").value);
    let fx = parseFloat(document.getElementById("fx").value);

    if (!capital || !percent) return;

    let profitUSD = capital * percent / 100;
    let profitMYR = profitUSD * fx;
    let target = capital + profitUSD;

    document.getElementById("result").innerHTML = `
        <div class="box">
            <div class="title">本金</div>
            <div class="value">$${capital.toFixed(2)}</div>
        </div>

        <div class="box">
            <div class="title">目标收益率</div>
            <div class="value blue">${percent}%</div>
        </div>

        <div class="box">
            <div class="title">盈利（USD）</div>
            <div class="value green">$${profitUSD.toFixed(2)}</div>
        </div>

        <div class="box">
            <div class="title">盈利（MYR）</div>
            <div class="value green">RM ${profitMYR.toFixed(2)}</div>
        </div>

        <div class="box">
            <div class="title">建议</div>
            <div class="value yellow">达到目标可分批止盈</div>
        </div>
    `;
}
</script>

</body>
</html>
